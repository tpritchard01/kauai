<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trip Itinerary</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

#map { position: absolute; top: 0; left: 0; right: 0; bottom: 140px; z-index: 1; }

#timeline-panel {
  position: absolute; bottom: 0; left: 0; right: 0; height: 140px;
  background: #fff; border-top: 2px solid #e0e0e0; z-index: 1000;
  display: flex; flex-direction: column; padding: 8px 16px 12px;
}

#event-info {
  text-align: center; padding: 4px 0 8px; min-height: 52px;
  display: flex; flex-direction: column; justify-content: center;
}
#event-info .icon { font-size: 20px; }
#event-info .title { font-weight: 600; font-size: 14px; margin-top: 2px; }
#event-info .time { font-size: 12px; color: #666; }

#slider-container { display: flex; align-items: center; gap: 8px; }
#slider {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 6px; background: #e0e0e0; border-radius: 3px; outline: none;
}
#slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px;
  background: #2196F3; border-radius: 50%; cursor: pointer;
}
#slider::-moz-range-thumb {
  width: 22px; height: 22px; background: #2196F3;
  border-radius: 50%; cursor: pointer; border: none;
}

#waypoints {
  display: flex; justify-content: space-between; padding: 6px 0 0;
  position: relative;
}
.dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #bbb; cursor: pointer; transition: background 0.2s, transform 0.2s;
}
.dot.active { background: #2196F3; transform: scale(1.4); }
.flag-btn.active { border-color: #2196F3 !important; }

#nav-buttons { display: flex; gap: 12px; align-items: center; }
#nav-buttons button {
  background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px;
}

@media (min-width: 768px) {
  #map { bottom: 160px; }
  #timeline-panel { height: 160px; padding: 12px 24px 16px; }
  #event-info .title { font-size: 16px; }
}
</style>
</head>
<body>
<div id="origin-modal" style="position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:32px;text-align:center;max-width:340px;width:90%">
    <h2 style="margin:0 0 8px;font-size:20px">Choose Your Origin</h2>
    <p style="margin:0 0 24px;color:#666;font-size:14px">Select where you're traveling from</p>
    <div style="display:flex;gap:16px;justify-content:center">
      <button onclick="selectOrigin('us')" style="border:none;background:none;cursor:pointer;padding:8px;border-radius:12px;transition:transform 0.2s" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
        <img src="USA.jpg" alt="USA" style="width:120px;height:72px;object-fit:cover;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.2)">
        <div style="margin-top:8px;font-weight:600;font-size:14px">USA</div>
      </button>
      <button onclick="selectOrigin('au')" style="border:none;background:none;cursor:pointer;padding:8px;border-radius:12px;transition:transform 0.2s" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
        <img src="AUS.jpg" alt="Australia" style="width:120px;height:72px;object-fit:cover;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.2)">
        <div style="margin-top:8px;font-weight:600;font-size:14px">Australia</div>
      </button>
    </div>
  </div>
</div>
<div id="map"></div>
<button id="lock-btn" onclick="unlockSecrets()" style="position:absolute;top:12px;left:12px;z-index:1001;font-size:20px;background:#fff;border:none;border-radius:50%;width:36px;height:36px;box-shadow:0 2px 6px rgba(0,0,0,0.3);cursor:pointer">🔒</button>
<div id="flag-toggle" style="position:absolute;top:12px;left:56px;z-index:1001;display:flex;gap:4px">
  <button class="flag-btn active" data-trip="us" onclick="loadTrip('us')" style="font-size:20px;background:#fff;border:2px solid transparent;border-radius:8px;width:40px;height:36px;box-shadow:0 2px 6px rgba(0,0,0,0.3);cursor:pointer">🇺🇸</button>
  <button class="flag-btn" data-trip="au" onclick="loadTrip('au')" style="font-size:20px;background:#fff;border:2px solid transparent;border-radius:8px;width:40px;height:36px;box-shadow:0 2px 6px rgba(0,0,0,0.3);cursor:pointer">🇦🇺</button>
</div>
<div id="timeline-panel">
  <div id="event-info">
    <span class="icon"></span>
    <span class="title"></span>
    <span class="time"></span>
  </div>
  <div id="slider-container">
    <div id="nav-buttons"><button id="prev">◀</button></div>
    <input type="range" id="slider" min="0" max="0" value="0">
    <div id="nav-buttons"><button id="next">▶</button></div>
  </div>
  <div id="waypoints"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="trip.js"></script>
</body>
</html>
